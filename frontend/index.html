<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackIt Room</title>
  <meta name="description" content="一個讓你開始亂想的空間。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══ Login Screen ═══════════════════════════════════════ -->
  <div id="login-screen">
    <div id="login-scanlines"></div>
    <div id="login-box">
      <div id="login-header">
        <div id="login-sys">HACKIT_OS v0.1.3</div>
        <div id="login-title">身份驗證系統</div>
        <div id="login-blink">█</div>
      </div>

      <div id="login-form">
        <div class="login-field">
          <label for="login-username">USER_ID</label>
          <input id="login-username" type="text" autocomplete="off" spellcheck="false" maxlength="24" />
        </div>
        <div class="login-field">
          <label for="login-password">ACCESS_CODE</label>
          <input id="login-password" type="password" maxlength="64" />
        </div>

        <div id="login-error"></div>

        <button id="login-submit">[ CONNECT → ]</button>

        <div id="login-switch-row">
          <span id="login-switch-text">尚無通行證？</span>
          <button id="login-switch-btn">申請</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loader">
    <div id="loader-inner">
      <div id="loader-title">HACKIT ROOM</div>
      <div id="loader-bar-wrap">
        <div id="loader-bar"></div>
      </div>
      <div id="loader-hint">請稍候...</div>
    </div>
  </div>

  <!-- Scene wrapper -->
  <div id="scene">
    <canvas id="room-canvas"></canvas>

    <!-- Scanlines overlay -->
    <div id="scanlines"></div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <span id="hud-title">HACKIT ROOM</span>
      <span id="hud-hint">點擊物件探索</span>
      <div id="hud-user">
        <button id="trophy-btn" title="成就">[ 🏆 ]</button>
        <span id="hud-username"></span>
        <button id="logout-btn" title="登出">[ 登出 ]</button>
      </div>
    </div>

    <!-- Sound toggle -->
    <button id="sound-btn" class="hidden" title="音效開關">♪</button>

    <!-- Dialog box -->
    <div id="dialog" class="hidden">
      <div id="dialog-header"><span id="dialog-src">???</span></div>
      <div id="dialog-body"></div>
      <button id="dialog-close">[ 關閉 ]</button>
    </div>

    <!-- Input panel (drawer) -->
    <div id="input-panel" class="hidden">
      <div id="input-title">留下你的想法</div>
      <div id="input-sub">不評分・不強制・只是留下</div>
      
      <div id="question-selector-container" class="hidden">
        <label for="question-select">回覆：</label>
        <select id="question-select">
          <option value="">(自由發揮)</option>
        </select>
      </div>

      <textarea id="user-input" maxlength="200" placeholder="在這裡輸入..."></textarea>
      <div id="input-actions">
        <button id="submit-btn">→ 送出</button>
        <button id="cancel-btn">取消</button>
      </div>
      <div id="submit-feedback" class="hidden">已記下。</div>
    </div>

    <!-- Terminal panel (computer) -->
    <div id="term-panel" class="hidden">
      <div id="term-header">
        <span id="term-title">HACKIT_OS — 記憶索引</span>
        <button id="term-close">[ 關閉 ]</button>
      </div>
      <div id="term-body"></div>
      <div id="term-input-line">
        <span id="term-prompt">&gt;</span>
        <input id="term-input" type="text" autocomplete="off" spellcheck="false" placeholder="輸入指令..." />
      </div>
    </div>
    <!-- Achievements Panel -->
    <div id="achievements-panel" class="hidden">
      <div id="achievements-header">
        <span id="achievements-title">記憶收集 (成就)</span>
        <button id="achievements-close">[ 關閉 ]</button>
      </div>
      <div id="achievements-body">
        <!-- Achievements will be populated here -->
      </div>
    </div>

    <!-- Announcement Panel -->
    <div id="announce-panel" class="hidden">
      <div id="announce-header">
        <span id="announce-title">📋 公告欄</span>
        <button id="announce-close">[ 關閉 ]</button>
      </div>
      <div id="announce-body">
        <!-- announcements rendered here -->
      </div>
      <!-- Admin: post new announcement -->
      <div id="announce-form" class="hidden">
        <textarea id="announce-input" maxlength="400" placeholder="輸入公告內容..."></textarea>
        <div id="announce-actions">
          <button id="announce-submit">[ 發布公告 ]</button>
        </div>
        <div id="announce-feedback" class="hidden">✓ 公告已發布</div>
      </div>
    </div>

    <!-- Announcement FAB button -->
    <button id="announce-btn" class="hidden" title="公告欄">📋</button>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>
  </div>

  <script src="achievements.js"></script>
  <script src="room.js"></script>
  <script src="main.js"></script>

  <!-- Fireworks canvas (easter egg) -->
  <canvas id="fireworks-canvas"></canvas>
</body>

</html>
